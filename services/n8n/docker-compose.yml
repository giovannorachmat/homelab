services:
  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    volumes:
      - ../../runtime/n8n/data:/home/node/.n8n

    networks:
      - private-net

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  private-net:
    external: true
