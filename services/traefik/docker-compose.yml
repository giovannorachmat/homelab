services:
  traefik:
    container_name: traefik
    image: traefik:latest
    restart: unless-stopped

    ports:
      - "9080:80"
      - "9443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - private-net

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.25"
          memory: 128M

networks:
  private-net:
    external: true
